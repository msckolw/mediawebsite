name: Deploy Backend to Render

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify API is responding before deployment
        run: |
          echo "🧪 Testing API endpoint before deployment..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://nobiasmedia.onrender.com/api/news?page=1)
          echo "Current API status: HTTP $HTTP_CODE"
          
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          echo "🚀 Triggering Render deployment..."
          
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK secret not set"
            echo "ℹ️ Render will auto-deploy from GitHub push"
            echo "ℹ️ No manual trigger needed"
          else
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK")
            if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ]; then
              echo "✅ Render deployment triggered successfully (HTTP $RESPONSE)"
            else
              echo "⚠️ Render deploy hook returned HTTP $RESPONSE"
              echo "ℹ️ Render may still auto-deploy from GitHub"
            fi
          fi

      - name: Wait for deployment
        run: |
          echo "⏳ Waiting for Render to deploy (60 seconds)..."
          echo "ℹ️ Render typically takes 1-2 minutes to build and deploy"
          sleep 60

      - name: Verify deployment
        run: |
          echo "🌐 Backend URL: https://nobiasmedia.onrender.com"
          
          # Test the endpoint with retries
          echo "🧪 Testing API endpoint..."
          MAX_RETRIES=5
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://nobiasmedia.onrender.com/api/news?page=1)
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ API is responding correctly (HTTP $HTTP_CODE)"
              echo "✅ Backend deployment successful!"
              exit 0
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "⏳ Attempt $RETRY_COUNT/$MAX_RETRIES: HTTP $HTTP_CODE (waiting 15s...)"
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                sleep 15
              fi
            fi
          done
          
          echo "⚠️ API returned HTTP $HTTP_CODE after $MAX_RETRIES attempts"
          echo "ℹ️ Render may still be deploying. Check: https://dashboard.render.com"
          exit 1
          
      - name: Deployment Summary
        if: always()
        run: |
          echo "═══════════════════════════════════════"
          echo "📊 Deployment Summary"
          echo "═══════════════════════════════════════"
          echo "Platform: Render"
          echo "Repository: msckolw/mediawebsite"
          echo "Branch: main"
          echo "Commit: ${{ github.sha }}"
          echo "Backend URL: https://nobiasmedia.onrender.com"
          echo "═══════════════════════════════════════"
          echo ""
          echo "🔍 Monitor deployment:"
          echo "  Dashboard: https://dashboard.render.com"
          echo "  API Test: https://nobiasmedia.onrender.com/api/news?page=1"
          echo ""
          echo "ℹ️ Render auto-deploys on push to main branch"
          echo "ℹ️ Deployment typically takes 1-2 minutes"
